<svg viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg" style="font-family: system-ui, sans-serif;">
  <defs>
    <filter id="sh" x="-4%" y="-4%" width="108%" height="116%"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.18"/></filter>
    <linearGradient id="gS" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#1a3a2e"/><stop offset="1" stop-color="#0d1a16"/></linearGradient>
    <linearGradient id="gP" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#1a2a1a"/><stop offset="1" stop-color="#0d1a0d"/></linearGradient>
  </defs>

  <rect width="680" height="520" rx="14" fill="#0d1117"/>

  <!-- Title -->
  <text x="340" y="38" text-anchor="middle" font-size="18" font-weight="800" fill="#f0f0f0">🧱  Memory Isolation Wall</text>
  <text x="340" y="60" text-anchor="middle" font-size="11" fill="#8b949e" font-style="italic">Each agent has its own private memory. Red wall = cannot cross.</text>

  <!-- Shared Layer - top -->
  <rect x="60" y="78" width="560" height="54" rx="6" fill="#1a3a2e" stroke="#7be0a0" stroke-width="1.5" filter="url(#sh)"/>
  <text x="340" y="100" text-anchor="middle" font-size="13" font-weight="700" fill="#7be0a0">🌐  SHARED LAYER  (all agents R/W)</text>
  <text x="340" y="120" text-anchor="middle" font-size="10" fill="#8b949e">coordinator.json  ·  constitution.md  ·  progress/  ·  agent-identities/</text>

  <!-- Red wall -->
  <line x1="60" y1="142" x2="620" y2="142" stroke="#f78166" stroke-width="3" stroke-dasharray=""/>
  <text x="340" y="136" text-anchor="middle" font-size="10" font-weight="700" fill="#f78166">🚫  MEMORY ISOLATION WALL  🚫</text>

  <!-- Agent private zones -->
  <!-- Agent A -->
  <rect x="60" y="156" width="160" height="140" rx="10" fill="#1a1a2e" stroke="#58a6ff" stroke-width="1.2" filter="url(#sh)"/>
  <rect x="60" y="156" width="160" height="30" rx="10" fill="#58a6ff" opacity="0.85"/>
  <text x="140" y="176" text-anchor="middle" font-size="12" font-weight="700" fill="white">🤖  Agent A</text>
  <rect x="74" y="196" width="132" height="28" rx="5" fill="#0d1117"/>
  <text x="140" y="213" text-anchor="middle" font-size="10" fill="#8b949e">private memory</text>
  <rect x="74" y="230" width="132" height="28" rx="5" fill="#0d1117"/>
  <text x="140" y="247" text-anchor="middle" font-size="10" fill="#8b949e">session logs</text>
  <rect x="74" y="264" width="132" height="28" rx="5" fill="#0d1117"/>
  <text x="140" y="281" text-anchor="middle" font-size="10" fill="#8b949e">preferences</text>

  <!-- X (cannot cross) -->
  <text x="105" y="360" font-size="22" fill="#f78166" font-weight="900" opacity="0.6">✗</text>
  <text x="155" y="360" font-size="10" fill="#f78166" opacity="0.7">NO ACCESS</text>

  <!-- Agent B -->
  <rect x="260" y="156" width="160" height="140" rx="10" fill="#1a1a2e" stroke="#f0c040" stroke-width="1.2" filter="url(#sh)"/>
  <rect x="260" y="156" width="160" height="30" rx="10" fill="#f0c040" opacity="0.85"/>
  <text x="340" y="176" text-anchor="middle" font-size="12" font-weight="700" fill="#1a1a2e">🤖  Agent B</text>
  <rect x="274" y="196" width="132" height="28" rx="5" fill="#0d1117"/>
  <text x="340" y="213" text-anchor="middle" font-size="10" fill="#8b949e">private memory</text>
  <rect x="274" y="230" width="132" height="28" rx="5" fill="#0d1117"/>
  <text x="340" y="247" text-anchor="middle" font-size="10" fill="#8b949e">session logs</text>
  <rect x="274" y="264" width="132" height="28" rx="5" fill="#0d1117"/>
  <text x="340" y="281" text-anchor="middle" font-size="10" fill="#8b949e">preferences</text>

  <text x="305" y="360" font-size="22" fill="#f78166" font-weight="900" opacity="0.6">✗</text>
  <text x="355" y="360" font-size="10" fill="#f78166" opacity="0.7">NO ACCESS</text>

  <!-- Agent C -->
  <rect x="460" y="156" width="160" height="140" rx="10" fill="#1a1a2e" stroke="#7be0a0" stroke-width="1.2" filter="url(#sh)"/>
  <rect x="460" y="156" width="160" height="30" rx="10" fill="#7be0a0" opacity="0.85"/>
  <text x="540" y="176" text-anchor="middle" font-size="12" font-weight="700" fill="#1a1a2e">🤖  Agent C</text>
  <rect x="474" y="196" width="132" height="28" rx="5" fill="#0d1117"/>
  <text x="540" y="213" text-anchor="middle" font-size="10" fill="#8b949e">private memory</text>
  <rect x="474" y="230" width="132" height="28" rx="5" fill="#0d1117"/>
  <text x="540" y="247" text-anchor="middle" font-size="10" fill="#8b949e">session logs</text>
  <rect x="474" y="264" width="132" height="28" rx="5" fill="#0d1117"/>
  <text x="540" y="281" text-anchor="middle" font-size="10" fill="#8b949e">preferences</text>

  <text x="505" y="360" font-size="22" fill="#f78166" font-weight="900" opacity="0.6">✗</text>
  <text x="555" y="360" font-size="10" fill="#f78166" opacity="0.7">NO ACCESS</text>

  <!-- Arrows to shared layer -->
  <path d="M 140 156 L 140 132" stroke="#58a6ff" stroke-width="1.5" fill="none" marker-end="url(#arrowS)" opacity="0.7"/>
  <path d="M 340 156 L 340 132" stroke="#f0c040" stroke-width="1.5" fill="none" marker-end="url(#arrowS)" opacity="0.7"/>
  <path d="M 540 156 L 540 132" stroke="#7be0a0" stroke-width="1.5" fill="none" marker-end="url(#arrowS)" opacity="0.7"/>
  <text x="340" y="126" text-anchor="middle" font-size="9" fill="#7be0a0" opacity="0.8">↕ read/write shared layer</text>

  <!-- Bottom note -->
  <rect x="60" y="378" width="560" height="120" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="76" y="402" font-size="12" font-weight="700" fill="#f78166">🚫  Why isolation matters</text>
  <text x="76" y="422" font-size="10" fill="#8b949e">• Without isolation: Agent A's wrong context leaks into Agent B's response → "my agents seem confused"</text>
  <text x="76" y="438" font-size="10" fill="#8b949e">• With isolation: each agent brings its own perspective → better collective decisions</text>
  <text x="76" y="454" font-size="10" fill="#8b949e">• Shared layer is ONLY for coordination: who's PM, what's the progress, handover state</text>
  <text x="76" y="470" font-size="10" fill="#8b949e">• Rule: NO agent may read another agent's private memory. This is enforced by convention (identity card).</text>
  <text x="76" y="486" font-size="10" fill="#8b949e" font-style="italic">  Enforcement is not technical (yet) — agents must voluntarily obey the protocol.</text>

  <defs>
    <marker id="arrowS" markerWidth="7" markerHeight="7" refX="3.5" refY="3.5"><circle cx="3.5" cy="3.5" r="2.5" fill="#7be0a0"/></marker>
  </defs>
</svg>
